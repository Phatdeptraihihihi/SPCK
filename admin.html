<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Quản lý phòng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f7f6; font-family: Arial, sans-serif;">

    <div class="admin-wrapper">
        <div class="admin-header">
            <h2>Phòng của ADMIN</h2>
            <button class="btn-primary" onclick="toggleForm()">+ Thêm phòng mới</button>
        </div>

        <div id="form-container" class="admin-form-card" style="display: none;">
            <h3 id="form-title">Thêm Phòng Mới</h3>
            <input type="hidden" id="room-id"> <div class="form-grid">
                <div class="input-item">
                    <label>Tên phòng</label>
                    <input type="text" id="room-name" placeholder="VD: Phòng Studio Quận 1">
                </div>
                <div class="input-item">
                    <label>Hình ảnh (URL)</label>
                    <input type="text" id="room-img" placeholder="Link ảnh...">
                </div>
                <div class="input-item">
                    <label>Giá tiền</label>
                    <input type="text" id="room-price" placeholder="VD: 5.000.000">
                </div>
                <div class="input-item">
                    <label>Diện tích</label>
                    <input type="text" id="room-area" placeholder="VD: 25">
                </div>
                <div class="input-item">
                    <label>Địa chỉ</label>
                    <input type="text" id="room-address" placeholder="Quận 1, TP.HCM">
                </div>
                <div class="input-item">
                    <label>Tiện ích</label>
                    <input type="text" id="room-utility" placeholder="Wifi, Máy lạnh...">
                </div>
                <div class="input-item">
                    <label>Trạng thái</label>
                    <select id="room-status">
                        <option value="Còn trống">Còn trống</option>
                        <option value="Hết phòng">Hết phòng</option>
                    </select>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-success" onclick="saveRoom()">Lưu dữ liệu</button>
                <button type="button" class="btn-secondary" onclick="toggleForm()">Hủy bỏ</button>
            </div>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Thông tin</th>
                        <th>Giá & Diện tích</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>

        <div id="pagination-wrapper" class="pagination">
            </div>
    </div>

    <script src="admin.js"></script>

    <style>
.admin-wrapper { max-width: 1100px; margin: 30px auto; padding: 20px; }
.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

/* Buttons */
.btn-primary { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.btn-success { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
.btn-secondary { background: #6c757d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
.btn-warning { background: #ffc107; color: #000; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-right: 5px; }
.btn-danger { background: #dc3545; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
button:hover { opacity: 0.9; }

/* Form Card */
.admin-form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.input-item label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
.input-item input, .input-item select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
.form-actions { display: flex; gap: 10px; }

/* Table */
.table-container { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
.admin-table { width: 100%; border-collapse: collapse; text-align: left; }
.admin-table th { background: #f8f9fa; padding: 15px; border-bottom: 2px solid #ddd; }
.admin-table td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
.admin-table tr:hover { background-color: #fcfcfc; }

/* Pagination */
.pagination { display: flex; justify-content: center; gap: 8px; margin-top: 25px; }
.page-btn { padding: 8px 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
.page-btn.active { background: #007bff; color: white; border-color: #007bff; }
.page-btn:hover:not(.active) { background: #f1f1f1; }
    </style>
</body>
</html>
